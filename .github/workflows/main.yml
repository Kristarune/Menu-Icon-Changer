name: Build Geode Mod

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Files
        run: dir
        shell: cmd

      - name: Verify Project Files
        shell: bash
        run: |
          test -f mod.json
          test -f CMakeLists.txt
          test -f src/main.cpp

      - name: Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: source-files
          path: .            echo "CMakeLists.txt missing"
            exit 1
          fi

      - name: Verify source folder
        run: |
          if [ ! -d src ]; then
            echo "src folder missing"
            exit 1
          fi

      - name: Verify main.cpp
        run: |
          if [ ! -f src/main.cpp ]; then
            echo "main.cpp missing"
            exit 1
          fi

      - name: Print project structure
        run: |
          find .

      - name: Check mod ID
        run: |
          grep "\"id\"" mod.json || exit 1

      - name: Check version
        run: |
          grep "\"version\"" mod.json || exit 1

      - name: Check Geode dependency
        run: |
          grep "\"geode\"" mod.json || exit 1

  release:
    name: Release
    needs:
      - build
      - validate

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
