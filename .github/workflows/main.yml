name: Build Geode Mod

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Win64

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: Geode Mod
          path: ${{ steps.build.outputs.build-output }}
