name: Build Geode Mod

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check mod.json
        run: test -f mod.json

      - name: Check CMakeLists.txt
        run: test -f CMakeLists.txt

      - name: Check main.cpp
        run: test -f src/main.cpp
      - name: Verify source folder
        run: |
          if [ ! -d src ]; then
            echo "src folder missing"
            exit 1
          fi

      - name: Verify main.cpp
        run: |
          if [ ! -f src/main.cpp ]; then
            echo "main.cpp missing"
            exit 1
          fi

      - name: Print project structure
        run: |
          find .

      - name: Check mod ID
        run: |
          grep "\"id\"" mod.json || exit 1

      - name: Check version
        run: |
          grep "\"version\"" mod.json || exit 1

      - name: Check Geode dependency
        run: |
          grep "\"geode\"" mod.json || exit 1

  release:
    name: Release
    needs:
      - build
      - validate

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
