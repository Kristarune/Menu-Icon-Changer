name: Build Geode Mod

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check mod.json
        run: test -f mod.json

      - name: Check CMakeLists.txt
        run: test -f CMakeLists.txt

      - name: Check src/main.cpp
        run: test -f src/main.cpp

      - name: Show tree
        run: find .
